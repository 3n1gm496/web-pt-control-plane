version: 1
name: safe-production
description: Non-destructive production profile for passive HTTP checks only.
rate_limit:
  requests: 5
  period_seconds: 60
network:
  timeout_seconds: 10
  max_redirects: 5
  user_agent: web-pt-control-plane/0.1
allowed_methods:
  - GET
checks:
  security_headers:
    enabled: true
    required_headers:
      - Content-Security-Policy
      - X-Frame-Options
      - X-Content-Type-Options
      - Strict-Transport-Security
      - Referrer-Policy
  cookie_security:
    enabled: true
    required_attributes:
      - Secure
      - HttpOnly
      - SameSite
  cors_inspection:
    enabled: true
    inspect_headers:
      - Access-Control-Allow-Origin
      - Access-Control-Allow-Credentials
      - Vary
  transport_security:
    enabled: true
    inspect_https_redirects: true
    inspect_hsts: true
  endpoint_inventory:
    enabled: true
    max_pages: 10
    max_depth: 2
    parse_html_only_for_link_extraction: true
  authorization_matrix:
    enabled: true
    profiles_dir: profiles
    expected_profiles:
      - guest
      - user
      - admin
    max_endpoints: 20
    compare_headers:
      - cache-control
      - location
      - content-type
    body_markers:
      - login
      - sign in
      - unauthorized
      - forbidden
      - access denied
      - admin
      - dashboard
safety:
  destructive_tests: false
  require_scope_allowlist: true
