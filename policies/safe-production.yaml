version: 1
name: safe-production
description: Non-destructive production profile for passive HTTP checks only.
rate_limit:
  requests: 5
  period_seconds: 60
network:
  timeout_seconds: 10
  max_redirects: 5
  user_agent: web-pt-control-plane/0.1
allowed_methods:
  - GET
checks:
  security_headers:
    enabled: true
    required_headers:
      - Content-Security-Policy
      - X-Frame-Options
      - X-Content-Type-Options
      - Strict-Transport-Security
      - Referrer-Policy
safety:
  destructive_tests: false
  require_scope_allowlist: true
